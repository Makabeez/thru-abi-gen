<svg xmlns="http://www.w3.org/2000/svg" width="920" height="240" viewBox="0 0 920 240" role="img" aria-label="thru-abi-gen">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E14"/>
      <stop offset="1" stop-color="#0E1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3DF5C4"/>
      <stop offset="1" stop-color="#4EA8FF"/>
    </linearGradient>
    <style>
      .mono { font-family: "SFMono-Regular", "JetBrains Mono", Consolas, monospace; }
      .title { font-weight: 800; letter-spacing: -1px; }
    </style>
  </defs>

  <rect width="920" height="240" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="918" height="238" rx="17" fill="none" stroke="#1C2735" stroke-width="1.5"/>

  <!-- pipeline: C struct  ->  { }  ->  ABI -->
  <g transform="translate(64,150)" class="mono" font-size="20" fill="#5B6B7E">
    <text x="0" y="0">struct { }.h</text>
    <text x="315" y="0" fill="#8091A3">──▶</text>
    <text x="405" y="0" fill="url(#accent)" font-weight="700">thru-abi-gen</text>
    <text x="600" y="0" fill="#8091A3">──▶</text>
    <text x="690" y="0">program.abi.yaml</text>
  </g>

  <!-- travelling packet along the pipeline -->
  <circle r="4.5" fill="#3DF5C4">
    <animateMotion path="M 190 144 H 860" dur="2.6s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1" calcMode="linear"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- title -->
  <text x="64" y="92" class="mono title" font-size="58" fill="#EAF2FF">thru-abi-gen</text>
  <rect x="66" y="106" width="0" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="0;360;360" keyTimes="0;0.6;1" dur="1.4s" fill="freeze"/>
  </rect>

  <!-- subtitle -->
  <text x="66" y="196" class="mono" font-size="18" fill="#9DB0C6">
    C structs → Thru ABI YAML. no more hand-written drift.
  </text>

  <!-- blinking cursor -->
  <rect x="558" y="74" width="14" height="26" fill="#3DF5C4">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
